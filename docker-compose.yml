version: '3.9'

# ═════════════════════════════════════════════════════════════════
# CAP Infinity — Docker Compose (Desktop / Self-Hosted)
#
# Usage:
#   1. Copy .env.example to .env and fill in ANTHROPIC_API_KEY
#   2. docker compose up -d
#   3. Open http://localhost:3000
#
# Requires: Docker Desktop (https://www.docker.com/products/docker-desktop/)
# ═════════════════════════════════════════════════════════════════

services:

  # ── CAP Infinity App ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cap-infinity-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:          production
      PORT:              3000
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_MODEL:   "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      ANTHROPIC_MAX_TOKENS: "${ANTHROPIC_MAX_TOKENS:-4096}"
      DB_HOST:           postgres
      DB_PORT:           5432
      DB_NAME:           "${DB_NAME:-cap_infinity}"
      DB_USER:           "${DB_USER:-cap_user}"
      DB_PASSWORD:       "${DB_PASSWORD:-cap_password_change_me}"
      SESSION_SECRET:    "${SESSION_SECRET:-change_me}"
      AI_RATE_LIMIT:     "${AI_RATE_LIMIT:-50}"
      LOG_FORMAT:        tiny
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 15s
    networks:
      - cap_net

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cap-infinity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${DB_NAME:-cap_infinity}"
      POSTGRES_USER:     "${DB_USER:-cap_user}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-cap_password_change_me}"
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-cap_user} -d ${DB_NAME:-cap_infinity}"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - cap_net

volumes:
  postgres_data:
    name: cap-infinity-postgres
  uploads_data:
    name: cap-infinity-uploads

networks:
  cap_net:
    name: cap-infinity-network
